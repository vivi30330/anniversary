<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family: "Microsoft JhengHei";
overflow:hidden;
background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:600px;
background-repeat:repeat;
background-color:rgba(255,255,255,0.85);
background-blend-mode:lighten;
}

/* 密碼頁 */

#passwordPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fff;
z-index:10;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

/* 測驗 */

#quiz{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.option{
margin:10px;
padding:10px 20px;
border:1px solid #333;
cursor:pointer;
}

/* 輪播 */

#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:300px;
transform-style:preserve-3d;
animation:rotate 20s linear infinite;
}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotateY(0deg);}
to{transform:translate(-50%,-50%) rotateY(360deg);}
}

.photo{
position:absolute;
width:200px;
height:200px;
left:50px;
top:50px;
cursor:pointer;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

/* 放大照片 */

#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:20;
}

#viewer img{
width:300px;
border-radius:10px;
}

/* 情話 */

#message{
margin-top:20px;
color:white;
font-size:22px;
}

/* 愛心 */

.heart{
position:fixed;
top:-50px;
font-size:30px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<!-- 音樂 -->
<audio autoplay loop>
<source src="music.mp3">
</audio>

<!-- 密碼 -->

<div id="passwordPage">

<h2>輸入密碼</h2>

<input id="password" type="password">

<button onclick="checkPassword()">進入</button>

</div>

<!-- 測驗 -->

<div id="quiz">

<h2 id="question"></h2>

<div id="options"></div>

</div>

<!-- 輪播 -->

<div id="carousel">

<div class="photo" style="transform:rotateY(0deg) translateZ(400px)" onclick="showPhoto(1)">
<img src="1.jpg">
</div>

<div class="photo" style="transform:rotateY(36deg) translateZ(400px)" onclick="showPhoto(2)">
<img src="2.jpg">
</div>

<div class="photo" style="transform:rotateY(72deg) translateZ(400px)" onclick="showPhoto(3)">
<img src="3.jpg">
</div>

<div class="photo" style="transform:rotateY(108deg) translateZ(400px)" onclick="showPhoto(4)">
<img src="4.jpg">
</div>

<div class="photo" style="transform:rotateY(144deg) translateZ(400px)" onclick="showPhoto(5)">
<img src="5.jpg">
</div>

<div class="photo" style="transform:rotateY(180deg) translateZ(400px)" onclick="showPhoto(6)">
<img src="6.jpg">
</div>

<div class="photo" style="transform:rotateY(216deg) translateZ(400px)" onclick="showPhoto(7)">
<img src="7.jpg">
</div>

<div class="photo" style="transform:rotateY(252deg) translateZ(400px)" onclick="showPhoto(8)">
<img src="8.jpg">
</div>

<div class="photo" style="transform:rotateY(288deg) translateZ(400px)" onclick="showPhoto(9)">
<img src="9.jpg">
</div>

<div class="photo" style="transform:rotateY(324deg) translateZ(400px)" onclick="showPhoto(10)">
<img src="10.jpg">
</div>

</div>

<!-- 照片放大 -->

<div id="viewer" onclick="closeViewer()">

<img id="viewerImg">

<div id="message"></div>

</div>

<script>

/* 密碼 */

function checkPassword(){

let p=document.getElementById("password").value;

if(p==="0828"){

document.getElementById("passwordPage").style.display="none";

startQuiz();

}else{

alert("密碼錯誤");

}

}

/* 測驗 */

let quizData=[

{

q:"第一次一起過夜的外縣市？",

options:["台中","台南","苗栗"],

answer:1

},

{

q:"99的五專及碩士科系分別是什麼？",

options:["醫檢科/生命科學系-生理組","醫管科/生命科學系-生理組","醫檢科/生技醫藥"],

answer:0

},

{

q:"99的鞋子穿幾號？",

options:["23","23.5","22.5"],

answer:1

}

];

let current=0;

function startQuiz(){

document.getElementById("quiz").style.display="flex";

showQuestion();

}

function showQuestion(){

let q=quizData[current];

document.getElementById("question").innerText=q.q;

let optionsHTML="";

q.options.forEach((o,i)=>{

optionsHTML+=`<div class="option" onclick="answer(${i})">${o}</div>`;

});

document.getElementById("options").innerHTML=optionsHTML;

}

function answer(i){

if(i===quizData[current].answer){

current++;

if(current<quizData.length){

showQuestion();

}else{

document.getElementById("quiz").style.display="none";

document.getElementById("carousel").style.display="block";

}

}else{

alert("你死定了");

}

}

/* 情話 */

let messages=[

"看屁",

"一直睡一直睡",

"我的珍藏都被你看光光了",

"堅持下去✊",

"也不是",

"多點幾次總會中獎的",

"猜錯了",

"按看看右邊那張",

"哈哈哈哈不是這個 再按看看右邊那張😈",

"嗶嗶嗶啵啵 𖤣𖥧𖥣｡𖥧𖧧"

];

function showPhoto(n){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=n+".jpg";

document.getElementById("message").innerText=messages[n-1];

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}

/* 愛心 */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerText="♡";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.color=Math.random()>0.5?"#ff8fb1":"#ff5c8a";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
