<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
background:#000;
overflow:hidden;
color:white;
}

/* 🎬 開場淡入 */
body.fade-in{
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* 背景 */

#bg{
position:fixed;
width:100%;
height:100%;
background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:400px;
opacity:0.25;
}

/* 密碼 */

#passwordPage{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
z-index:10;
}

/* 手機滑動 */

#mobileSlider{
display:none;
position:absolute;
width:100%;
height:100%;
overflow-x:auto;
white-space:nowrap;
scroll-snap-type:x mandatory;
}

.slide{
display:inline-block;
width:80%;
margin:0 10%;
scroll-snap-align:center;
}

.slide img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
border-radius:12px;
}

/* 電腦3D */

#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform-style:preserve-3d;
transform:translate(-50%,-50%);
animation:spin 90s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotateY(0)}
100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

.photo{
position:absolute;
width:120px;
height:160px;
left:-60px;
top:-80px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

/* 🎬 聚焦背景 */

#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
opacity:0;
transition:0.5s;
pointer-events:none;
z-index:15;
}

#overlay.show{
opacity:1;
}

/* 卡片 */

#viewer{
display:none;
position:fixed;
width:100%;
height:100%;
justify-content:center;
align-items:center;
z-index:20;
}

.card{
width:260px;
height:340px;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
overflow:hidden;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
background:#111;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
font-size:18px;
}

/* 🎬 字幕打字機 */

#typing{
position:fixed;
bottom:30px;
width:90%;
left:5%;
text-align:center;
font-size:18px;
color:#fff;
line-height:1.6;
letter-spacing:1px;
}

</style>
</head>

<body class="fade-in">

<div id="bg"></div>
<div id="overlay"></div>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<!-- 密碼 -->
<div id="passwordPage">
<h2>請輸入密碼進入神奇小空間</h2>
<input id="password">
<button onclick="enter()">進入</button>
</div>

<!-- 手機 -->
<div id="mobileSlider"></div>

<!-- 電腦 -->
<div id="carousel"></div>

<!-- 卡片 -->
<div id="viewer" onclick="closeViewer(event)">
<div class="card" id="card">
<div class="front"><img id="photoImg"></div>
<div class="back"><div id="message"></div></div>
</div>
</div>

<div id="typing"></div>

<script>

/* 🎬 音樂淡入 */

function playMusic(){
let m=document.getElementById("bgm");
m.volume=0;
m.play().catch(()=>{});

let v=0;
let fade=setInterval(()=>{
v+=0.02;
if(v>=1){v=1;clearInterval(fade);}
m.volume=v;
},200);
}

/* 密碼 */

function enter(){
if(document.getElementById("password").value==="0828"){
document.getElementById("passwordPage").style.display="none";
playMusic();
start();
}else{
alert("密碼錯誤");
}
}

/* 啟動 */

function start(){

let isMobile = window.innerWidth < 768;

/* 手機 */
if(isMobile){
let slider=document.getElementById("mobileSlider");
slider.style.display="block";

for(let i=1;i<=20;i++){
slider.innerHTML+=`
<div class="slide" onclick="openPhoto(${i})">
<img src="${i}.jpg" loading="lazy">
</div>`;
}
}

/* 電腦 */
else{
let c=document.getElementById("carousel");
c.style.display="block";

for(let i=1;i<=20;i++){
let deg=(i-1)*(360/20);

let div=document.createElement("div");
div.className="photo";
div.style.transform=`rotateY(${deg}deg) translateZ(300px)`;
div.onclick=()=>openPhoto(i);

div.innerHTML=`<img src="${i}.jpg">`;
c.appendChild(div);
}
}

startTyping();
}

/* 情話 */

let words=[
"看屁","一直睡一直睡","我的珍藏都被你看光光了","堅持下去✊","也不是",
"多點幾次總會中獎的","猜錯了","按看看右邊那張","哈哈哈哈不是這個 再按看看右邊那張😈","嗶嗶嗶啵啵"
];

/* 打開 */

function openPhoto(n){

document.getElementById("viewer").style.display="flex";
document.getElementById("overlay").classList.add("show");

document.getElementById("photoImg").src=n+".jpg";
document.getElementById("message").innerText=words[n-1]||"❤️";

setTimeout(()=>{
document.getElementById("card").classList.add("flip");
},400);

}

/* 關閉 */

function closeViewer(e){
if(e.target.id==="viewer"){
document.getElementById("viewer").style.display="none";
document.getElementById("overlay").classList.remove("show");
document.getElementById("card").classList.remove("flip");
}
}

/* 打字機 */

let text="兩週年快樂張張 很開心我們又一起度過了一個年頭 請多多指教摟";
let i=0;

function startTyping(){
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text[i];
i++;
setTimeout(type,80);
}
}
type();
}

</script>

</body>
</html>
