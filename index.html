<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
overflow:hidden;

background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:500px;
background-repeat:repeat;
background-color:rgba(255,255,255,0.85);
background-blend-mode:lighten;
}

/* 密碼頁 */

#passwordPage{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;

background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:500px;
background-repeat:repeat;
background-color:rgba(255,255,255,0.9);
background-blend-mode:lighten;
z-index:10;
}

/* 輪播 */

#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform-style:preserve-3d;
transform:translate(-50%,-50%);
width:300px;
height:400px;
animation:spin 100s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotateY(0)}
100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

.photo{
position:absolute;
width:100px;
height:140px;
left:100px;
top:120px;
cursor:pointer;

/* 模糊效果 */
opacity:0.4;
filter:blur(2px);
transition:0.5s;
}

.photo.active{
opacity:1;
filter:blur(0);
transform:scale(1.2) !important;
z-index:2;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
will-change: transform;
}

/* 卡片 */

#viewer{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:20;
}

.card{
width:240px;
height:320px;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
overflow:hidden;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
background:white;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
font-size:18px;
}

/* 愛心 */

.heart{
position:fixed;
top:-50px;
opacity:0.5;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* 打字機 */

#typing{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:20px;
color:#ff4f87;
}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<!-- 密碼 -->

<div id="passwordPage">
<h2>請輸入密碼進入神奇小空間</h2>
<input id="password" type="password">
<button onclick="checkPassword()">進入</button>
</div>

<!-- 輪播 -->

<div id="carousel"></div>

<!-- 卡片 -->

<div id="viewer" onclick="closeViewer(event)">
<div class="card" id="card">

<div class="front">
<img id="photoImg">
</div>

<div class="back">
<div id="message"></div>
</div>

</div>
</div>

<div id="typing"></div>

<script>

/* 音樂 */

function startMusic(){
let m=document.getElementById("bgm");
m.play().catch(()=>{});
document.body.addEventListener("click",()=>m.play(),{once:true});
}

/* 手機判斷 */

let isMobile = window.innerWidth < 768;
let radius = isMobile ? 160 : 350;

/* 生成20張 */

for(let i=1;i<=20;i++){

let deg=(i-1)*(360/20);

document.getElementById("carousel").innerHTML+=`
<div class="photo"
style="transform:rotateY(${deg}deg) translateZ(${radius}px)"
onclick="openPhoto(${i})">
<img src="${i}.jpg">
</div>`;

}

/* 密碼 */

let wrong=0;

function checkPassword(){

if(document.getElementById("password").value==="0828"){

document.getElementById("passwordPage").style.display="none";
document.getElementById("carousel").style.display="block";
startMusic();
startTyping();

}else{

wrong++;
if(wrong==1) alert("給我100塊給你提示");
else alert("你快沒機會了老兄");

}

}

/* 情話 */

let words=[

"看屁","一直睡一直睡","我的珍藏都被你看光光了","左邊那張看看","右邊那張點看看",
"看屁","雞雞好吃","按看看右邊那張","哈哈哈哈不是這個 再按看看右邊那張😈","嗶嗶嗶啵啵",
"我拔拔好可愛哦","好吃","吃雞雞","點旁邊那張看看","看屁",
"看屁","看屁","看屁","吃雞雞","看屁"

];

function openPhoto(n){

document.getElementById("viewer").style.display="flex";
document.getElementById("photoImg").src=n+".jpg";
document.getElementById("message").innerText=words[n-1];

setTimeout(()=>{
document.getElementById("card").classList.add("flip");
},300);

}

function closeViewer(e){

if(e.target.id==="viewer"){
document.getElementById("viewer").style.display="none";
document.getElementById("card").classList.remove("flip");
}

}

/* 愛心 */

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
h.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
},1500);

/* 打字機 */

let text="兩週年快樂張張 很開心我們又一起度過了一個年頭 請多多指教摟";
let i=0;

function startTyping(){

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,120);
}
}

type();

}

/* 前面清晰效果 */

setInterval(()=>{

let photos = document.querySelectorAll(".photo");

photos.forEach(p=>{
p.classList.remove("active");
});

photos.forEach(p=>{

let rect = p.getBoundingClientRect();

if(rect.left > window.innerWidth*0.3 && rect.left < window.innerWidth*0.7){
p.classList.add("active");
}

});

},300);

</script>

</body>
</html>
