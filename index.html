<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<!-- 💗 可愛字體 -->
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
overflow:hidden;
background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:400px;
background-repeat:repeat;
background-color:#fff0f5;
}

/* 淡入 */
body{animation:fadeIn 1.5s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* 密碼 */
#passwordPage{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(255,255,255,0.9);
z-index:10;
}

/* 測驗 */
#quiz{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(255,255,255,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9;
}

.option{
margin:10px;
padding:10px 20px;
background:white;
border:1px solid black;
cursor:pointer;
}

/* 手機滑動 */
#mobileSlider{
display:none;
position:absolute;
width:100%;
height:100%;
overflow-x:auto;
white-space:nowrap;
scroll-snap-type:x mandatory;
}

.slide{
display:inline-block;
width:80%;
margin:0 10%;
scroll-snap-align:center;
}

.slide img{
width:100%;
aspect-ratio:3/4;
object-fit:cover;
border-radius:12px;
}

/* 電腦3D */
#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform-style:preserve-3d;
transform:translate(-50%,-50%);
animation:spin 90s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotateY(0)}
100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

.photo{
position:absolute;
width:110px;
height:150px;
left:-55px;
top:-75px;
cursor:pointer;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

/* 背景變暗 */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
transition:0.5s;
pointer-events:none;
z-index:15;
}
#overlay.show{opacity:1;}

/* 卡片 */
#viewer{
display:none;
position:fixed;
width:100%;
height:100%;
justify-content:center;
align-items:center;
z-index:20;
}

.card{
width:260px;
height:340px;
transform-style:preserve-3d;
transition:0.8s;
}

.card.flip{transform:rotateY(180deg);}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
overflow:hidden;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
background:white;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

/* ✨ 可愛打字機 */
#typing{
position:fixed;
bottom:20px;
width:90%;
left:5%;
text-align:center;
font-size:20px;
color:#ff4f87;
line-height:1.6;
font-family:'ZCOOL KuaiLe', cursive;
}

</style>
</head>

<body>

<div id="overlay"></div>

<audio id="bgm" loop preload="auto">
<source src="music.mp3">
</audio>

<div id="passwordPage">
<h2>請輸入密碼進入神奇小空間</h2>
<input id="password">
<button onclick="enter()">進入</button>
</div>

<div id="quiz">
<h2 id="question"></h2>
<div id="options"></div>
</div>

<div id="mobileSlider"></div>
<div id="carousel"></div>

<div id="viewer" onclick="closeViewer(event)">
<div class="card" id="card">
<div class="front"><img id="photoImg"></div>
<div class="back"><div id="message"></div></div>
</div>
</div>

<div id="typing"></div>

<script>

/* 🎵 音樂 */
function playMusic(){
let m=document.getElementById("bgm");
m.play().catch(()=>{});
}

/* 密碼 */
function enter(){
if(document.getElementById("password").value==="0828"){
document.getElementById("passwordPage").style.display="none";
playMusic();
startQuiz();
}else{
alert("密碼錯誤");
}
}

/* 測驗 */
let quiz=[
{q:"第一次一起過夜的外縣市？",o:["台中","台南","苗栗"],a:1},
{q:"99的五專及碩士科系分別是什麼？",o:["醫檢科/生命科學系-生理組","醫管科/生命科學系-生理組","醫檢科/生技醫藥"],a:0},
{q:"99的鞋子穿幾號？",o:["23","23.5","22.5"],a:1}
];
let qi=0;

function startQuiz(){
document.getElementById("quiz").style.display="flex";
showQ();
}

function showQ(){
let q=quiz[qi];
document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((t,i)=>{
html+=`<div class="option" onclick="answer(${i})">${t}</div>`;
});
document.getElementById("options").innerHTML=html;
}

function answer(i){
if(i===quiz[qi].a){
qi++;
if(qi<quiz.length){
showQ();
}else{
document.getElementById("quiz").style.display="none";
start();
}
}else{
alert("你死定了");
}
}

/* 🚀 預載圖片（加速） */
for(let i=1;i<=20;i++){
let img=new Image();
img.src=i+".jpg";
}

/* 啟動 */
function start(){

let isMobile=window.innerWidth<768;

if(isMobile){
let s=document.getElementById("mobileSlider");
s.style.display="block";

for(let i=1;i<=20;i++){
s.innerHTML+=`
<div class="slide" onclick="openPhoto(${i})">
<img src="${i}.jpg" loading="lazy">
</div>`;
}
}else{
let c=document.getElementById("carousel");
c.style.display="block";

for(let i=1;i<=20;i++){
let deg=(i-1)*(360/20);
let div=document.createElement("div");
div.className="photo";
div.style.transform=`rotateY(${deg}deg) translateZ(300px)`;
div.onclick=()=>openPhoto(i);
div.innerHTML=`<img src="${i}.jpg">`;
c.appendChild(div);
}
}

startTyping();
}

/* 情話 */
let words=[
看屁","一直睡一直睡","我的珍藏都被你看光光了","左邊那張看看","右邊那張點看看",
"看屁","雞雞好吃","按看看右邊那張","哈哈哈哈不是這個 再按看看右邊那張😈","嗶嗶嗶啵啵",
"我拔拔好可愛哦","好吃","吃雞雞","點旁邊那張看看","看屁",
"看屁","看屁","看屁","吃雞雞","看屁"
];

function openPhoto(n){
document.getElementById("viewer").style.display="flex";
document.getElementById("overlay").classList.add("show");

document.getElementById("photoImg").src=n+".jpg";
document.getElementById("message").innerText=words[n-1]||"❤️";

setTimeout(()=>{
document.getElementById("card").classList.add("flip");
},300);
}

function closeViewer(e){
if(e.target.id==="viewer"){
document.getElementById("viewer").style.display="none";
document.getElementById("overlay").classList.remove("show");
document.getElementById("card").classList.remove("flip");
}
}

/* 💗 愛心（輕量版） */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="❤";
h.style.position="fixed";
h.style.top="-20px";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*18)+"px";
h.style.opacity=0.6;
h.style.transform=`rotate(${Math.random()*360}deg)`;
h.style.animation=`fall ${5+Math.random()*4}s linear`;

document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
},2000);

let style=document.createElement("style");
style.innerHTML=`@keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}`;
document.head.appendChild(style);

/* 打字機 */
let text="兩週年快樂張張 很開心我們又一起度過了一個年頭 請多多指教摟";
let i=0;

function startTyping(){
function t(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text[i];
i++;
setTimeout(t,80);
}
}
t();
}

</script>

</body>
</html>
