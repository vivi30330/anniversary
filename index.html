<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
overflow:hidden;

/* 回憶錄背景（這次不會壞） */
background-image:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:400px;
background-repeat:repeat;
background-color:#fff0f5;
}

/* 半透明覆蓋（讓字看得清楚） */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(255,255,255,0.7);
z-index:-1;
}

/* 密碼頁 */

#passwordPage{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

/* 測驗 */

#quiz{
display:none;
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9;
}

.option{
margin:10px;
padding:10px 20px;
border:1px solid black;
background:white;
cursor:pointer;
}

/* 輪播 */

#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform-style:preserve-3d;
transform:translate(-50%,-50%);
animation:spin 90s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotateY(0)}
100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

.photo{
position:absolute;
width:100px;
height:140px;
left:-50px;
top:-70px;
cursor:pointer;
opacity:0.4;
filter:blur(2px);
transition:0.5s;
}

.photo.active{
opacity:1;
filter:blur(0);
transform:scale(1.2);
z-index:2;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

/* 卡片 */

#viewer{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:20;
}

.card{
width:240px;
height:320px;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
background:white;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* 打字機 */

#typing{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:20px;
color:#ff4f87;
}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<!-- 密碼 -->

<div id="passwordPage">
<h2>請輸入密碼進入神奇小空間</h2>
<input id="password">
<button onclick="enter()">進入</button>
</div>

<!-- 測驗 -->

<div id="quiz">
<h2 id="question"></h2>
<div id="options"></div>
</div>

<!-- 輪播 -->

<div id="carousel"></div>

<!-- 卡片 -->

<div id="viewer" onclick="closeViewer(event)">
<div class="card" id="card">
<div class="front"><img id="photoImg"></div>
<div class="back"><div id="message"></div></div>
</div>
</div>

<div id="typing"></div>

<script>

/* 音樂 */

function playMusic(){
let m=document.getElementById("bgm");
m.play().catch(()=>{});
document.body.addEventListener("click",()=>m.play(),{once:true});
}

/* 進入 */

function enter(){
let p=document.getElementById("password").value;

if(p==="0828"){
document.getElementById("passwordPage").style.display="none";
playMusic();
startQuiz();
}else{
alert("密碼錯誤");
}
}

/* 測驗 */

let quiz=[
{q:"第一次一起過夜的外縣市？",o:["台中","台南","苗栗"],a:1},
{q:"99的五專及碩士科系分別是什麼？",o:["醫檢科/生命科學系-生理組","醫管科/生命科學系-生理組","醫檢科/生技醫藥"],a:0},
{q:"99的鞋子穿幾號？",o:["23","23.5","22.5"],a:1}
];

let qi=0;

function startQuiz(){
document.getElementById("quiz").style.display="flex";
showQ();
}

function showQ(){
let q=quiz[qi];
document.getElementById("question").innerText=q.q;

let html="";
for(let i=0;i<q.o.length;i++){
html+=`<div class="option" onclick="answer(${i})">${q.o[i]}</div>`;
}
document.getElementById("options").innerHTML=html;
}

function answer(i){
if(i===quiz[qi].a){
qi++;
if(qi<quiz.length){
showQ();
}else{
document.getElementById("quiz").style.display="none";
startCarousel();
startTyping();
}
}else{
alert("你死定了");
}
}

/* 輪播 */

function startCarousel(){

let c=document.getElementById("carousel");
c.style.display="block";

let radius=window.innerWidth<768?160:300;

for(let i=1;i<=20;i++){

let deg=(i-1)*(360/20);

let div=document.createElement("div");
div.className="photo";
div.style.transform=`rotateY(${deg}deg) translateZ(${radius}px)`;
div.onclick=()=>openPhoto(i);

div.innerHTML=`<img src="${i}.jpg">`;

c.appendChild(div);

}

}

/* 情話 */

let words=["看屁","一直睡一直睡","我的珍藏都被你看光光了","看屁","看屁","好可愛哦","猜錯了","按看看右邊那張","哈哈哈哈不是這個 再按看看右邊那張😈","嗶嗶嗶啵啵"];

function openPhoto(n){
document.getElementById("viewer").style.display="flex";
document.getElementById("photoImg").src=n+".jpg";
document.getElementById("message").innerText=words[n-1]||"❤️";

setTimeout(()=>{
document.getElementById("card").classList.add("flip");
},300);
}

function closeViewer(e){
if(e.target.id==="viewer"){
document.getElementById("viewer").style.display="none";
document.getElementById("card").classList.remove("flip");
}
}

/* 打字機 */

let text="兩週年快樂張張 很開心我們又一起度過了一個年頭 請多多指教摟";
let ti=0;

function startTyping(){
function t(){
if(ti<text.length){
document.getElementById("typing").innerHTML+=text[ti];
ti++;
setTimeout(t,100);
}
}
t();
}

/* 景深 */

setInterval(()=>{
let ps=document.querySelectorAll(".photo");
ps.forEach(p=>p.classList.remove("active"));

ps.forEach(p=>{
let r=p.getBoundingClientRect();
if(r.left>window.innerWidth*0.3 && r.left<window.innerWidth*0.7){
p.classList.add("active");
}
});
},300);

</script>

</body>
</html>
