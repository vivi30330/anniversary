<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兩週年快樂</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:"PingFang TC","Noto Sans TC",sans-serif;
background:
linear-gradient(rgba(255,255,255,0.75),rgba(255,255,255,0.75)),
url("bg.jpg") center/contain no-repeat fixed;
}

/* 共用彈窗 */
.popup{
position:fixed;
inset:0;
background:rgba(255,255,255,0.96);
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.box{
width:90%;
max-width:420px;
background:white;
border-radius:16px;
padding:24px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.box input{
width:100%;
padding:10px;
font-size:16px;
margin-top:10px;
}

.box button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

/* 主畫面 */

#main{
display:none;
padding:40px 0 120px;
text-align:center;
}

.photos{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.photo{
width:220px;
max-width:80vw;
margin:14px;
perspective:1000px;
}

.card{
width:100%;
transition:transform .8s;
transform-style:preserve-3d;
position:relative;
}

.photo.active .card{
transform:rotateY(180deg) scale(1.2);
z-index:5;
}

.side{
width:100%;
backface-visibility:hidden;
border-radius:14px;
overflow:hidden;
}

.front img{
width:100%;
display:block;
}

.back{
position:absolute;
inset:0;
background:white;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:16px;
font-size:16px;
}

/* 底部文字 */

footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:16px;
}

</style>
</head>

</div>
</div>

<div id="opts"></div>

<!-- 主畫面 -->

<div id="main">
<div class="photos" id="photos"></div>
</div>

<footer>兩週年快樂 😈 張張有要續約嗎</footer>
