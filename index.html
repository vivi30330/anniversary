<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:
linear-gradient(rgba(255,255,255,0.8),rgba(255,255,255,0.8)),
url("bg.jpg") center/contain no-repeat fixed;
}

.popup{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
z-index:10;
}

.box{
background:white;
padding:25px;
border-radius:14px;
width:90%;
max-width:380px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

#main{
display:none;
padding:40px 0 120px;
text-align:center;
}

.photos{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.photo{
width:220px;
margin:14px;
perspective:1000px;
}

.card{
transition:transform .8s;
transform-style:preserve-3d;
position:relative;
}

.photo.active .card{
transform:rotateY(180deg) scale(1.2);
}

.side{
width:100%;
backface-visibility:hidden;
border-radius:12px;
overflow:hidden;
}

.front img{
width:100%;
display:block;
}

.back{
position:absolute;
inset:0;
background:white;
transform:rotateY(180deg);
display:flex;
align-items:center;
justify-content:center;
padding:16px;
text-align:center;
}

footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:16px;
}

</style>
</head>

<body>

<audio id="bgm" src="music.mp3" loop></audio>

<!-- 密碼 -->

<div id="passwordPage" class="popup">

<div class="box">

<h2>輸入密碼</h2>

<input id="pw" type="password" placeholder="輸入密碼">

<button id="enterBtn">進入</button>

</div>

</div>

<!-- 問答 -->

<div id="quiz" class="popup" style="display:none">

<div class="box">

<h2 id="q"></h2>

<div id="opts"></div>

</div>

</div>

<!-- 主畫面 -->

<div id="main">

<div class="photos" id="photos"></div>

</div>

<footer>兩週年快樂 😈 張張有要續約嗎</footer>

<script>

const PASSWORD="0828"

const enterBtn=document.getElementById("enterBtn")

enterBtn.onclick=checkPw

document.getElementById("pw").addEventListener("keydown",e=>{
if(e.key==="Enter") checkPw()
})

function checkPw(){

const value=document.getElementById("pw").value.trim()

if(value===PASSWORD){

document.getElementById("passwordPage").style.display="none"

document.getElementById("quiz").style.display="flex"

startMusic()

showQuiz()

}else{

alert("密碼錯誤")

}

}

function startMusic(){

const music=document.getElementById("bgm")

music.play().catch(()=>{})

document.body.addEventListener("click",()=>music.play(),{once:true})

}

/* 問答 */

const quiz=[

{q:"第一次一起過夜的外縣市？",a:["台中","台南","苗栗"],c:1},

{q:"99的五專及碩士科系分別是什麼？",a:[

"醫檢科/生命科學系-生理組",

"醫管科/生命科學系-生理組",

"醫檢科/生技醫藥"],c:0},

{q:"99的鞋子穿幾號？",a:["23","23.5","22.5"],c:1}

]

let qi=0

function showQuiz(){

const qEl=document.getElementById("q")

const optEl=document.getElementById("opts")

qEl.textContent=quiz[qi].q

optEl.innerHTML=""

quiz[qi].a.forEach((t,i)=>{

const b=document.createElement("button")

b.textContent=t

b.onclick=()=>{

if(i===quiz[qi].c){

qi++

if(qi<quiz.length){

showQuiz()

}else{

startMain()

}

}else{

alert("你死定了")

}

}

optEl.appendChild(b)

})

}

function startMain(){

document.getElementById("quiz").style.display="none"

document.getElementById("main").style.display="block"

loadPhotos()

}

/* 情話 */

const love=[

"看屁",

"一直睡一直睡",

"我的珍藏都被你看光光了",

"堅持下去✊",

"也不是",

"多點幾次總會中獎的",

"猜錯了",

"按看看右邊那張",

"哈哈哈哈不是這個 再按看看右邊那張😈",

"嗶嗶嗶啵啵 𖤣𖥧𖥣｡𖥧𖧧"

]

function loadPhotos(){

const box=document.getElementById("photos")

let i=1

function tryLoad(){

const img=new Image()

img.src=i+".jpg"

img.onload=()=>{

const p=document.createElement("div")

p.className="photo"

p.innerHTML=`

<div class="card">

<div class="side front"><img src="${i}.jpg"></div>

<div class="side back">${love[i-1]||""}</div>

</div>

`

p.onclick=()=>{

document.querySelectorAll(".photo").forEach(x=>x.classList.remove("active"))

p.classList.add("active")

}

box.appendChild(p)

i++

tryLoad()

}

}

tryLoad()

}

</script>

</body>
</html>
