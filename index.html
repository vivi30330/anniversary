<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
overflow:hidden;
background:#fff0f5;
}

/* 手機用滑動 */

#mobileSlider{
display:none;
position:absolute;
width:100%;
height:100%;
overflow-x:auto;
white-space:nowrap;
scroll-snap-type:x mandatory;
}

.slide{
display:inline-block;
width:80%;
margin:0 10%;
scroll-snap-align:center;
}

.slide img{
width:100%;
border-radius:15px;
}

/* 電腦3D */

#carousel{
display:none;
position:absolute;
top:50%;
left:50%;
transform-style:preserve-3d;
transform:translate(-50%,-50%);
animation:spin 80s linear infinite;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotateY(0)}
100%{transform:translate(-50%,-50%) rotateY(360deg)}
}

.photo{
position:absolute;
width:120px;
height:160px;
left:-60px;
top:-80px;
}

.photo img{
width:100%;
height:100%;
border-radius:10px;
}

/* 卡片 */

#viewer{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:20;
}

.card{
width:260px;
height:340px;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}

.front img{
width:100%;
height:100%;
object-fit:cover;
}

.back{
background:white;
transform:rotateY(180deg);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* 打字機 */

#typing{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:18px;
color:#ff4f87;
}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<div id="mobileSlider"></div>
<div id="carousel"></div>

<div id="viewer" onclick="closeViewer(event)">
<div class="card" id="card">
<div class="front"><img id="photoImg"></div>
<div class="back"><div id="message"></div></div>
</div>
</div>

<div id="typing"></div>

<script>

/* 音樂 */
document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

/* 判斷裝置 */
let isMobile = window.innerWidth < 768;

/* 情話 */
let words=[
"看屁","一直睡一直睡","我的珍藏都被你看光光了","堅持下去✊","也不是",
"多點幾次總會中獎的","猜錯了","按看看右邊那張","哈哈哈哈不是這個 再按看看右邊那張😈","嗶嗶嗶啵啵"
];

/* 手機 */
if(isMobile){

let slider=document.getElementById("mobileSlider");
slider.style.display="block";

for(let i=1;i<=20;i++){
slider.innerHTML+=`
<div class="slide" onclick="openPhoto(${i})">
<img src="${i}.jpg">
</div>`;
}

}

/* 電腦 */
else{

let c=document.getElementById("carousel");
c.style.display="block";

for(let i=1;i<=20;i++){
let deg=(i-1)*(360/20);

let div=document.createElement("div");
div.className="photo";
div.style.transform=`rotateY(${deg}deg) translateZ(300px)`;
div.onclick=()=>openPhoto(i);

div.innerHTML=`<img src="${i}.jpg">`;
c.appendChild(div);
}

}

/* 點照片 */
function openPhoto(n){
document.getElementById("viewer").style.display="flex";
document.getElementById("photoImg").src=n+".jpg";
document.getElementById("message").innerText=words[n-1]||"❤️";

setTimeout(()=>{
document.getElementById("card").classList.add("flip");
},300);
}

function closeViewer(e){
if(e.target.id==="viewer"){
document.getElementById("viewer").style.display="none";
document.getElementById("card").classList.remove("flip");
}
}

/* 打字機 */

let text="兩週年快樂張張 很開心我們又一起度過了一個年頭 請多多指教摟";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text[i];
i++;
setTimeout(type,100);
}
}

type();

</script>

</body>
</html>
