<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>兩週年快樂</title>

<style>

body{
margin:0;
font-family:"Microsoft JhengHei";
overflow:hidden;

background:url("B17AA438-737E-43B7-A170-5A848FE84EAA.jpeg");
background-size:500px;
background-repeat:repeat;
background-color:rgba(255,255,255,0.85);
background-blend-mode:lighten;
}

/* 密碼頁 */

#passwordPage{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:white;
z-index:10;
text-align:center;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:18px;
cursor:pointer;
}

/* 測驗 */

#quiz{
display:none;
position:fixed;
width:100%;
height:100%;
background:white;
z-index:9;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.option{
margin:10px;
padding:10px 20px;
border:1px solid black;
cursor:pointer;
}

/* 3D輪播 */

#carousel{

display:none;

position:absolute;

top:50%;

left:50%;

transform-style:preserve-3d;

transform:translate(-50%,-50%);

width:300px;

height:300px;

animation:spin 25s linear infinite;

}

@keyframes spin{

0%{transform:translate(-50%,-50%) rotateY(0)}

100%{transform:translate(-50%,-50%) rotateY(360deg)}

}

.photo{

position:absolute;

width:200px;

height:200px;

left:50px;

top:50px;

cursor:pointer;

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

border-radius:10px;

}

/* 照片翻面 */

#viewer{

display:none;

position:fixed;

width:100%;

height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;

align-items:center;

z-index:20;

}

.card{

width:300px;

height:300px;

position:relative;

transform-style:preserve-3d;

transition:transform 0.8s;

}

.card.flip{

transform:rotateY(180deg);

}

.front,.back{

position:absolute;

width:100%;

height:100%;

backface-visibility:hidden;

border-radius:12px;

overflow:hidden;

}

.front img{

width:100%;

height:100%;

object-fit:cover;

}

.back{

background:white;

transform:rotateY(180deg);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

font-size:22px;

text-align:center;

}

/* 愛心 */

.heart{

position:fixed;

top:-50px;

color:#ff6fa5;

font-size:30px;

animation:fall linear forwards;

}

@keyframes fall{

to{

transform:translateY(110vh) rotate(360deg);

}

}

</style>
</head>

<body>

<audio autoplay loop>

<source src="music.mp3">

</audio>

<!-- 密碼 -->

<div id="passwordPage">

<h2>請輸入密碼進入神奇小空間</h2>

<input id="password" type="password">

<button onclick="checkPassword()">進入</button>

</div>

<!-- 測驗 -->

<div id="quiz">

<h2 id="question"></h2>

<div id="options"></div>

</div>

<!-- 輪播 -->

<div id="carousel">

<script>

for(let i=1;i<=10;i++){

let deg=(i-1)*36;

document.write(`

<div class="photo"

style="transform:rotateY(${deg}deg) translateZ(400px)"

onclick="openPhoto(${i})">

<img src="${i}.jpg">

</div>

`);

}

</script>

</div>

<!-- 照片卡片 -->

<div id="viewer" onclick="closeViewer(event)">

<div class="card" id="card">

<div class="front">

<img id="photoImg">

</div>

<div class="back">

<div id="message"></div>

</div>

</div>

</div>

<script>

/* 密碼 */

let wrong=0;

function checkPassword(){

let p=document.getElementById("password").value;

if(p==="0828"){

document.getElementById("passwordPage").style.display="none";

startQuiz();

}else{

wrong++;

if(wrong==1) alert("給我100塊給你提示");

else alert("你快沒機會了老兄");

}

}

/* 測驗 */

let quiz=[

{

q:"第一次一起過夜的外縣市？",

o:["台中","台南","苗栗"],

a:1

},

{

q:"99的五專及碩士科系分別是什麼？",

o:["醫檢科/生命科學系-生理組","醫管科/生命科學系-生理組","醫檢科/生技醫藥"],

a:0

},

{

q:"99的鞋子穿幾號？",

o:["23","23.5","22.5"],

a:1

}

];

let qIndex=0;

function startQuiz(){

document.getElementById("quiz").style.display="flex";

showQ();

}

function showQ(){

let q=quiz[qIndex];

document.getElementById("question").innerText=q.q;

let html="";

q.o.forEach((t,i)=>{

html+=`<div class="option" onclick="answer(${i})">${t}</div>`;

});

document.getElementById("options").innerHTML=html;

}

function answer(i){

if(i==quiz[qIndex].a){

qIndex++;

if(qIndex<quiz.length) showQ();

else{

document.getElementById("quiz").style.display="none";

document.getElementById("carousel").style.display="block";

}

}else{

alert("你死定了");

}

}

/* 情話 */

let words=[

"看屁",

"一直睡一直睡",

"我的珍藏都被你看光光了",

"堅持下去✊",

"也不是",

"多點幾次總會中獎的",

"猜錯了",

"按看看右邊那張",

"哈哈哈哈不是這個 再按看看右邊那張😈",

"嗶嗶嗶啵啵 𖤣𖥧𖥣｡𖥧𖧧"

];

function openPhoto(n){

document.getElementById("viewer").style.display="flex";

document.getElementById("photoImg").src=n+".jpg";

document.getElementById("message").innerText=words[n-1];

setTimeout(()=>{

document.getElementById("card").classList.add("flip");

},300);

}

function closeViewer(e){

if(e.target.id==="viewer"){

document.getElementById("viewer").style.display="none";

document.getElementById("card").classList.remove("flip");

}

}

/* 愛心 */

function heart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*40)+"px";

h.style.animationDuration=(4+Math.random()*4)+"s";

h.style.transform=`rotate(${Math.random()*360}deg)`;

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

}

setInterval(heart,300);

</script>

</body>
</html>
